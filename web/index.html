<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Industrial Security Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root {
  --bg: #0a0c10;
  --surface: #12151c;
  --surface2: #181c26;
  --border: #1e2330;
  --accent: #22d3a7;
  --danger: #ef4444;
  --warn: #f59e0b;
  --blue: #3b82f6;
  --purple: #a855f7;
  --text: #e8eaed;
  --text2: #7c829d;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans SC', system-ui, sans-serif;
  --radius: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

.topbar {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo-img { height: 32px; width: auto; }
.title-group { display: flex; flex-direction: column; gap: 2px; }
.topbar-title { font-size: 15px; font-weight: 700; color: var(--text); }
.topbar-subtitle { font-size: 11px; color: var(--text2); }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.lang-switch { display: flex; align-items: center; gap: 4px; }
.lang-btn {
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--text2);
  font-size: 11px;
  cursor: pointer;
}
.lang-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.conn-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); font-family: var(--mono); }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); transition: all 0.3s; }
.conn-dot.off { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
.conn-dot.connecting { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: pulse 1.5s infinite; }
.clock { font-family: var(--mono); font-size: 11px; color: var(--text2); text-align: right; line-height: 1.25; max-width: 200px; white-space: nowrap; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.shell {
  display: grid;
  grid-template-columns: 1fr 380px;
  grid-template-rows: auto 1fr;
  gap: 12px;
  padding: 12px 16px;
  height: calc(100vh - 48px);
}

.metrics {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  position: relative;
  overflow: hidden;
}
.metric::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; }
.metric.m-det::before { background: var(--blue); }
.metric.m-trk::before { background: var(--purple); }
.metric.m-evt::before { background: var(--warn); }
.metric.m-up::before { background: #6b7280; }
.metric.m-model::before { background: var(--danger); }
.m-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text2); margin-bottom: 4px; }
.m-val { font-family: var(--mono); font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
.m-det .m-val { color: var(--blue); }
.m-trk .m-val { color: var(--purple); }
.m-evt .m-val { color: var(--warn); }
.m-model .m-val { color: var(--danger); font-size: 16px; }

.video-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 600;
}
.panel-head .sub { color: var(--text2); font-weight: 400; }

.camera-grid {
  flex: 1;
  display: grid;
  gap: 4px;
  padding: 4px;
  background: #000;
  min-height: 0;
}
.camera-grid.cols-1 { grid-template-columns: 1fr; }
.camera-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.camera-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

.camera-cell {
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.camera-cell:hover { border-color: var(--text2); }
.camera-cell.active { border-color: var(--accent); }
.camera-cell img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.camera-cell .cam-label {
  position: absolute;
  top: 6px;
  left: 6px;
  background: rgba(0,0,0,0.7);
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-family: var(--mono);
  color: var(--accent);
}
.camera-cell .cam-status {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
}
.camera-cell .cam-status.off { background: var(--danger); }

.draw-toolbar {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  background: rgba(0,0,0,0.7);
  padding: 8px 12px;
  border-radius: 6px;
  z-index: 50;
}

.right-col {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  min-height: 0;
  height: 100%;
  overflow: hidden;
}

.right-col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
  background: var(--surface);
  position: relative;
  z-index: 10;
}

.right-col-content {
  flex: 1 1 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
}

.camera-tabs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.camera-tab {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  background: transparent;
  color: var(--text2);
  transition: all 0.2s;
  white-space: nowrap;
}
.camera-tab:hover { border-color: var(--text2); color: var(--text); }
.camera-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

.events-section,
.snaps-section,
.model-section,
.control-section,
.feature-section,
.rules-section,
.btn-row-section,
.add-camera-section {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}

.events-wrap {
  background: transparent;
  border: none;
  border-radius: 0;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}
.events-wrap .panel-head {
  padding: 0 0 8px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.evt-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 2px 0;
  max-height: 250px;
}
.evt {
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.evt-tag {
  padding: 2px 0;
  text-align: center;
  border-radius: 4px;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase;
}
.tag-zone_enter { background: rgba(34,211,167,0.12); color: var(--accent); }
.tag-loitering { background: rgba(245,158,11,0.12); color: var(--warn); }
.tag-line_cross { background: rgba(239,68,68,0.12); color: var(--danger); }
.evt-body { min-width: 0; }
.evt-main { color: var(--text); font-weight: 500; }
.evt-sub { color: var(--text2); font-family: var(--mono); font-size: 10px; }
.evt-time { color: var(--text2); font-family: var(--mono); font-size: 10px; white-space: nowrap; }
.evt-cam { color: var(--blue); font-size: 9px; }

.ctrl-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.ctrl-field { display: flex; flex-direction: column; gap: 3px; }
.ctrl-field.full { grid-column: 1 / -1; }
.ctrl-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); }
.ctrl-inp {
  padding: 6px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
}
.ctrl-inp:focus { border-color: var(--accent); }

.date-picker {
  padding: 4px 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  outline: none;
  cursor: pointer;
}
.date-picker:focus { border-color: var(--accent); }
.date-picker::-webkit-calendar-picker-indicator {
  filter: invert(1);
  cursor: pointer;
}

.model-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.model-card {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.model-card:hover { border-color: var(--text2); }
.model-card.active { border-color: var(--accent); background: rgba(34,211,167,0.08); }
.model-card.loading { border-color: var(--warn); background: rgba(245,158,11,0.06); pointer-events: none; }
.model-card .mc-name { font-family: var(--mono); font-size: 13px; font-weight: 600; }
.model-card.active .mc-name { color: var(--accent); }
.model-card .mc-info { font-size: 10px; color: var(--text2); }
.model-card .mc-badge {
  font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.mc-badge.current { background: rgba(34,211,167,0.15); color: var(--accent); }
.mc-badge.ready { background: rgba(59,130,246,0.12); color: var(--blue); }
.mc-badge.build { background: rgba(245,158,11,0.12); color: var(--warn); }
.mc-badge.switching { background: rgba(245,158,11,0.2); color: var(--warn); animation: pulse 1s infinite; }

.feature-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.feature-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.feature-item:hover { border-color: var(--text2); }
.feature-item.active { border-color: var(--accent); background: rgba(34,211,167,0.08); }
.feature-checkbox { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
.feature-label { font-size: 11px; color: var(--text); cursor: pointer; }

.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn {
  flex: 1;
  padding: 7px 12px;
  border: none;
  border-radius: 5px;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-sm { padding: 7px 14px; flex: 0; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { filter: brightness(1.15); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--text2); color: var(--text); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-detect {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 2px solid;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-detect.off {
  background: #1a2332;
  border-color: #334155;
  color: #94a3b8;
}
.btn-detect.off:hover { background: #1e3a5f; border-color: #3b82f6; color: #60a5fa; }
.btn-detect.on {
  background: linear-gradient(135deg, #065f46, #047857);
  border-color: #10b981;
  color: #fff;
  box-shadow: 0 0 12px rgba(16,185,129,0.3);
}
.btn-detect.on:hover { filter: brightness(1.15); }

.section-gap { margin-top: 10px; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.snap-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  padding: 6px;
  max-height: 200px;
  overflow-y: auto;
}
.snap-thumb {
  width: 100%; aspect-ratio: 16/9;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s;
}
.snap-thumb:hover { border-color: var(--accent); }
.snap-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.snap-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
.snap-empty { grid-column: 1/-1; text-align: center; padding: 16px; color: var(--text2); font-size: 11px; }

.zone-controls { display: flex; flex-direction: column; gap: 8px; }
.zone-toggle-row { display: flex; flex-direction: column; gap: 6px; }
.zone-list { display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; }
.zone-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
}
.zone-item .zone-name { flex: 1; color: var(--text); }
.zone-item .zone-delete {
  background: transparent;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 14px;
  padding: 0 4px;
}
.zone-item .zone-delete:hover { color: #ff6b6b; }

.toast {
  position: fixed; bottom: 20px; right: 20px;
  padding: 10px 18px;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 6px;
  font-size: 12px; color: var(--accent);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { border-color: var(--danger); color: var(--danger); }
.toast.info { border-color: var(--blue); color: var(--blue); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 500; display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  width: 420px;
  max-width: 90vw;
}
.modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--text); }
.modal .form-group { margin-bottom: 12px; }
.modal .form-group label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.8px; }
.modal .form-group input, .modal .form-group select {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
}
.modal .form-group input:focus { border-color: var(--accent); }
.modal .btn-row { margin-top: 16px; }
.modal .status-msg { font-size: 11px; margin-top: 8px; min-height: 16px; }
.modal .status-msg.ok { color: var(--accent); }
.modal .status-msg.err { color: var(--danger); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="seeedIcon.png" alt="Seeed" class="logo-img">
    <div class="title-group">
      <div class="topbar-title" data-zh="工业安防行为检测" data-en="Industrial Security Detection">工业安防行为检测</div>
      <div class="topbar-subtitle">Seeed reComputer Industrial</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中文</button>
      <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
    </div>
    <div class="conn-badge">
      <div class="conn-dot connecting" id="connDot"></div>
      <span id="connText">--</span>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</div>

<div class="shell">
  <div class="metrics">
    <div class="metric m-det">
      <div class="m-label" data-zh="检测人数" data-en="DETECTIONS">检测人数</div>
      <div class="m-val" id="vDet">--</div>
    </div>
    <div class="metric m-trk">
      <div class="m-label" data-zh="跟踪目标" data-en="TRACKING">跟踪目标</div>
      <div class="m-val" id="vTrk">--</div>
    </div>
    <div class="metric m-evt">
      <div class="m-label" data-zh="事件数量" data-en="EVENTS">事件数量</div>
      <div class="m-val" id="vEvt">0</div>
    </div>
    <div class="metric m-up">
      <div class="m-label" data-zh="运行时间" data-en="UPTIME">运行时间</div>
      <div class="m-val" id="vUp">--:--</div>
    </div>
    <div class="metric m-model">
      <div class="m-label" data-zh="推理模型" data-en="MODEL">推理模型</div>
      <div class="m-val" id="vModel">--</div>
    </div>
  </div>

  <div class="video-wrap">
    <div class="panel-head">
      <span data-zh="实时监控" data-en="Live View">实时监控</span>
      <span class="sub" id="camCount">0</span>
    </div>
    <div class="camera-grid cols-1" id="cameraGrid">
    </div>
  </div>

  <div class="right-col">
    <div class="right-col-header">
      <span data-zh="控制面板" data-en="Control Panel">控制面板</span>
    </div>
    <div class="right-col-content">
      <div class="camera-tabs" id="cameraTabs"></div>

      <div class="events-section">
        <div class="events-wrap">
          <div class="panel-head">
             <span data-zh="事件日志" data-en="Event Log">事件日志</span>
            <div style="display:flex; align-items:center; gap:6px;">
              <input type="date" id="eventDate" class="date-picker" onchange="loadEventsByDate()">
              <button class="btn-sm btn-ghost" onclick="resetEventDate()" title="清除日期筛选">✕</button>
            </div>
            <span class="sub" id="evtCount">0</span>
          </div>
          <div class="evt-scroll" id="evtList"></div>
        </div>
      </div>

      <div class="snaps-section">
        <div class="panel-head" style="padding: 0; margin-bottom: 8px;">
          <span data-zh="事件截图" data-en="Snapshots">事件截图</span>
          <span class="sub" id="snapCount">0</span>
        </div>
        <div class="snap-gallery" id="snapGallery">
          <div class="snap-empty" data-zh="暂无截图" data-en="No snapshots">暂无截图</div>
        </div>
      </div>

      <div class="model-section">
        <div class="panel-head" style="padding: 0; margin-bottom: 8px;"><span data-zh="模型选择" data-en="Model Selection">模型选择</span></div>
        <div class="model-list" id="modelList"></div>
      </div>

      <div class="control-section">
        <div class="panel-head" style="padding: 0; margin-bottom: 8px;"><span data-zh="检测控制" data-en="Detection Control">检测控制</span></div>
        <button id="btnDetect" class="btn-detect on" onclick="toggleDetect()">⏹ 停止检测</button>
      </div>

      <div class="feature-section">
        <div class="panel-head" style="padding: 0; margin-bottom: 8px;"><span data-zh="功能开关" data-en="Feature Toggles">功能开关</span></div>
        <div class="feature-grid" id="featureGrid"></div>
      </div>

      <div class="rules-section">
        <div class="panel-head" style="padding: 0; margin-bottom: 8px;"><span data-zh="检测区域" data-en="Detection Zones">检测区域</span></div>
        <div class="zone-controls">
          <div class="zone-toggle-row">
            <div class="feature-item" id="zoneToggle" onclick="toggleZoneDrawing()">
              <input type="checkbox" class="feature-checkbox" id="zoneToggleCheckbox">
              <span class="feature-label" data-zh="启用区域绘制" data-en="Enable Zone Drawing">启用区域绘制</span>
            </div>
          </div>
          <div class="zone-list" id="zoneList"></div>
          <div class="btn-row" style="margin-top: 8px;">
            <button class="btn btn-ghost btn-sm" onclick="clearAllZones()" data-zh="清空所有区域" data-en="Clear All Zones">清空所有区域</button>
          </div>
        </div>
      </div>

      <div class="rules-section">
        <div class="panel-head" style="padding: 0; margin-bottom: 8px;"><span data-zh="检测规则" data-en="Detection Rules">检测规则</span></div>
        <div class="ctrl-grid">
          <div class="ctrl-field">
            <span class="ctrl-lbl" data-zh="冷却时间 (秒)" data-en="Cooldown (s)">冷却时间 (秒)</span>
            <input class="ctrl-inp" type="number" id="inCooldown" min="1" max="120" value="8">
          </div>
          <div class="ctrl-field">
            <span class="ctrl-lbl" data-zh="徘徊时间 (秒)" data-en="Loiter (s)">徘徊时间 (秒)</span>

          <div class="ctrl-field full">
            <span class="ctrl-lbl" data-zh="置信度阈值" data-en="Confidence">置信度阈值</span>
            <input class="ctrl-inp" type="number" id="inConf" min="0.1" max="0.9" step="0.05" value="0.35">
          </div>
        </div>
      </div>

      <div class="add-camera-section">
        <div class="panel-head" style="padding: 0; margin-bottom: 8px;"><span data-zh="添加摄像头" data-en="Add Camera">添加摄像头</span></div>
        <div class="ctrl-grid">
          <div class="ctrl-field">
            <span class="ctrl-lbl">IP 地址</span>
            <input class="ctrl-inp" type="text" id="addCamIP" placeholder="192.168.3.x">
          </div>
          <div class="ctrl-field">
            <span class="ctrl-lbl">摄像头名称</span>
            <input class="ctrl-inp" type="text" id="addCamName" placeholder="camera-name">
          </div>
          <div class="ctrl-field">
            <span class="ctrl-lbl">用户名</span>
            <input class="ctrl-inp" type="text" id="addCamUser" value="admin">
          </div>
          <div class="ctrl-field">
            <span class="ctrl-lbl">密码</span>
            <input class="ctrl-inp" type="text" id="addCamPass" value="">
          </div>
          <div class="ctrl-field full">
            <span class="ctrl-lbl">RTSP 路径</span>
            <input class="ctrl-inp" type="text" id="addCamPath" value="/Streaming/Channels/101">
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="probeAndAddCamera()" data-zh="探测并添加" data-en="Probe & Add">探测并添加</button>
          <button class="btn btn-ghost" onclick="probeCamera()" data-zh="仅探测" data-en="Probe Only">仅探测</button>
        </div>
        <div id="addCamStatus" style="font-size:11px; margin-top:6px; min-height:16px;"></div>
      </div>

      <div class="btn-row-section">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="applyConfig()" data-zh="应用配置" data-en="Apply">应用配置</button>
          <button class="btn btn-ghost" onclick="clearEvents()" data-zh="清空日志" data-en="Clear Log">清空日志</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);

let currentLang = localStorage.getItem('lang') || 'zh';
let detectActive = true;
let wsVideo = null, wsConfig = null;
let streamMode = 'mjpeg';
let reconnectTimer = null, reconnectAttempts = 0;
const MAX_RECONNECT = 10;
const wsVideoUrl = `ws://${location.hostname}:8081`;
const wsConfigUrl = `ws://${location.hostname}:8082`;

let cameraList = [];
let activeCamId = null;
let cameraStreams = {};

const FEATURES = [
  { key: 'human_detect', zh: '人形检测', en: 'Human Detect' },
  { key: 'tracking',     zh: '目标跟踪', en: 'Tracking' },
  { key: 'zone_detection', zh: '区域检测', en: 'Zone Detect' },
  { key: 'line_crossing', zh: '越线检测', en: 'Line Cross' },
  { key: 'loitering',    zh: '徘徊检测', en: 'Loitering' },
];

let featureFlags = {};
FEATURES.forEach(f => featureFlags[f.key] = true);

const EVENT_LABELS = {
  zh: { zone_enter: '区域进入', loitering: '徘徊告警', line_cross: '越线告警' },
  en: { zone_enter: 'Zone Entry', loitering: 'Loitering', line_cross: 'Line Cross' }
};

function pad(n) { return n < 10 ? '0' + n : n; }

function formatEvtDisplay(ts) {
  if (!ts || ts.length < 15) return { sub: ts || '--', short: '' };
  const datePart = ts.slice(0, 8);
  const timePart = ts.slice(9);
  if (datePart.length === 8 && timePart.length === 6) {
    const sub = `${datePart.slice(0, 4)}-${datePart.slice(4, 6)}-${datePart.slice(6, 8)} ${timePart.slice(0, 2)}:${timePart.slice(2, 4)}:${timePart.slice(4, 6)}`;
    const short = `${timePart.slice(0, 2)}:${timePart.slice(2, 4)}:${timePart.slice(4, 6)}`;
    return { sub, short };
  }
  return { sub: ts, short: ts.slice(-8) };
}

function fmtUp(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
  return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
}

function toast(msg, type) {
  const el = $('toast');
  el.textContent = msg;
  el.className = `toast show ${type || ''}`;
  setTimeout(() => el.classList.remove('show'), 2200);
}
function t(zh, en) { return currentLang === 'zh' ? zh : en; }

function switchLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.querySelectorAll('[data-zh]').forEach(el => {
    el.textContent = lang === 'zh' ? el.dataset.zh : el.dataset.en;
  });
  buildFeatureGrid();
  updateDetectBtn();
  pollEvents();
  updateClock();
}

function updateClock() {
  const el = $('clock');
  const now = new Date();
  const locale = currentLang === 'zh' ? 'zh-CN' : 'en-US';
  const options = { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  const formatter = new Intl.DateTimeFormat(locale, options);
  const parts = formatter.formatToParts(now);
  const month = parts.find(p => p.type === 'month').value;
  const day = parts.find(p => p.type === 'day').value;
  const hour = parts.find(p => p.type === 'hour').value;
  const minute = parts.find(p => p.type === 'minute').value;
  const second = parts.find(p => p.type === 'second').value;
  const weekday = now.toLocaleDateString(locale, { weekday: 'short' });
  el.textContent = `${weekday} ${month}/${day} ${hour}:${minute}:${second}`;
  el.title = '系统时间';
}

function modelDisplayName(onnx) {
  if (!onnx) return '--';
  return onnx.replace('.onnx', '').replace('yolov', 'YOLOv').replace('yolo', 'YOLO');
}

function buildFeatureGrid() {
  const grid = $('featureGrid');
  grid.innerHTML = FEATURES.map(f => {
    const checked = featureFlags[f.key] ? 'checked' : '';
    const active = featureFlags[f.key] ? ' active' : '';
    const label = currentLang === 'zh' ? f.zh : f.en;
    return `<div class="feature-item${active}" data-key="${f.key}" onclick="onFeatureClick('${f.key}')">
      <input type="checkbox" class="feature-checkbox" ${checked} tabindex="-1">
      <span class="feature-label">${label}</span>
    </div>`;
  }).join('');
}

function onFeatureClick(key) {
  featureFlags[key] = !featureFlags[key];
  buildFeatureGrid();
  sendConfig();
}

function toggleDetect() {
  detectActive = !detectActive;
  FEATURES.forEach(f => featureFlags[f.key] = detectActive);
  if (detectActive) featureFlags.loitering = false;
  buildFeatureGrid();
  updateDetectBtn();
  sendConfig();
  toast(detectActive ? t('检测已启动', 'Detection started') : t('检测已停止', 'Detection stopped'),
        detectActive ? '' : 'info');
}

function updateDetectBtn() {
  const btn = $('btnDetect');
  btn.className = `btn-detect ${detectActive ? 'on' : 'off'}`;
  btn.textContent = detectActive
    ? (currentLang === 'zh' ? '⏹ 停止检测' : '⏹ Stop Detection')
    : (currentLang === 'zh' ? '▶ 开始检测' : '▶ Start Detection');
}

let availableModels = [];
let currentModelFile = '';
let switchingModel = false;

async function loadModels() {
  try {
    const r = await fetch('/api/models');
    availableModels = await r.json();
    renderModelList();
  } catch(e) {}
}

function renderModelList() {
  const list = $('modelList');
  list.innerHTML = availableModels.map(m => {
    const isCurrent = m.onnx_file === currentModelFile;
    const cls = switchingModel === m.onnx_file ? 'model-card loading' : (isCurrent ? 'model-card active' : 'model-card');
    let badge;
    if (switchingModel === m.onnx_file) {
      badge = `<span class="mc-badge switching">${t('切换中...','switching...')}</span>`;
    } else if (isCurrent) {
      badge = `<span class="mc-badge current">${t('当前','current')}</span>`;
    } else if (m.has_engine) {
      badge = `<span class="mc-badge ready">${t('就绪','ready')}</span>`;
    } else {
      badge = `<span class="mc-badge build">${t('需构建','build')}</span>`;
    }
    return `<div class="${cls}" onclick="selectModel('${m.onnx_file}')">
      <div><div class="mc-name">${modelDisplayName(m.onnx_file)}</div><div class="mc-info">${m.size_mb} MB · ${m.has_engine ? 'TensorRT' : 'ONNX'}</div></div>
      ${badge}
    </div>`;
  }).join('');
}

async function selectModel(onnx) {
  if (switchingModel || onnx === currentModelFile) return;
  switchingModel = onnx;
  renderModelList();
  $('vModel').textContent = '...';
  try {
    const r = await fetch('/api/model/switch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ onnx_file: onnx })
    });
    const data = await r.json();
    if (data.status === 'ok') {
      currentModelFile = data.model || onnx;
      toast(t('模型已切换: ', 'Switched to ') + modelDisplayName(currentModelFile));
      $('vModel').textContent = modelDisplayName(currentModelFile);
    } else {
      toast(data.error || t('切换失败', 'Switch failed'), 'error');
      $('vModel').textContent = modelDisplayName(currentModelFile);
    }
  } catch(e) {
    toast(t('切换失败', 'Switch failed'), 'error');
    $('vModel').textContent = modelDisplayName(currentModelFile);
  } finally {
    switchingModel = false;
    renderModelList();
    loadModels();
  }
}

let zoneDrawingMode = false;
let drawPoints = [];
let customZones = [];
let cameraZones = {};
let zoneCounter = 1;
let zoneCanvas = null;
let zoneCtx = null;

function setupZoneCanvas() {
  if (!activeCamId) return;
  const cell = document.getElementById(`cell-${activeCamId}`);
  if (!cell) return;

  let canvas = cell.querySelector('.zone-canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.className = 'zone-canvas';
    canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:crosshair;';
    cell.appendChild(canvas);
  }
  zoneCanvas = canvas;
  zoneCtx = canvas.getContext('2d');

  const rect = cell.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  canvas.onclick = function(e) {
    if (!zoneDrawingMode) return;
    e.stopPropagation();
    const x = e.offsetX / canvas.width;
    const y = e.offsetY / canvas.height;
    drawPoints.push([x, y]);
    redrawZoneCanvas();
  };

  canvas.onmousemove = function(e) {
    if (!zoneDrawingMode || drawPoints.length === 0) return;
    redrawZoneCanvas(e.offsetX / canvas.width, e.offsetY / canvas.height);
  };

  redrawZoneCanvas();
}

function redrawZoneCanvas(mx, my) {
  if (!zoneCtx || !zoneCanvas) return;
  const w = zoneCanvas.width, h = zoneCanvas.height;
  zoneCtx.clearRect(0, 0, w, h);

  if (drawPoints.length === 0) return;

  zoneCtx.strokeStyle = '#22d3a7';
  zoneCtx.fillStyle = 'rgba(34,211,167,0.15)';
  zoneCtx.lineWidth = 2;
  zoneCtx.beginPath();
  zoneCtx.moveTo(drawPoints[0][0] * w, drawPoints[0][1] * h);
  for (let i = 1; i < drawPoints.length; i++) {
    zoneCtx.lineTo(drawPoints[i][0] * w, drawPoints[i][1] * h);
  }
  if (mx !== undefined && my !== undefined) {
    zoneCtx.lineTo(mx * w, my * h);
  }
  if (drawPoints.length >= 3) {
    zoneCtx.closePath();
    zoneCtx.fill();
  }
  zoneCtx.stroke();

  drawPoints.forEach(([px, py]) => {
    zoneCtx.fillStyle = '#22d3a7';
    zoneCtx.beginPath();
    zoneCtx.arc(px * w, py * h, 4, 0, Math.PI * 2);
    zoneCtx.fill();
  });
}

function removeZoneCanvas() {
  if (zoneCanvas) {
    zoneCanvas.remove();
    zoneCanvas = null;
    zoneCtx = null;
  }
}

function finalizeZone() {
  if (drawPoints.length < 3) {
    toast(t('至少需要3个点来定义区域', 'Need at least 3 points for a zone'), 'error');
    return;
  }
  const zone = {
    name: `zone_${zoneCounter++}`,
    dwell_seconds: parseFloat($('inDwell').value) || 10,
    color_bgr: [0, 255, 255],
    points: drawPoints.map(p => [Math.round(p[0] * 1000) / 1000, Math.round(p[1] * 1000) / 1000])
  };
  customZones.push(zone);
  drawPoints = [];
  renderZoneList();
  sendZonesToServer();
  toast(t(`区域 "${zone.name}" 已添加`, `Zone "${zone.name}" added`));
  redrawZoneCanvas();
}

function toggleZoneDrawing() {
  zoneDrawingMode = !zoneDrawingMode;
  const checkbox = $('zoneToggleCheckbox');
  if (zoneDrawingMode) {
    checkbox.checked = true;
    $('zoneToggle').classList.add('active');
    drawPoints = [];
    setupZoneCanvas();
    toast(t('点击视频画面绘制区域，完成后再次点击此按钮', 'Click video to draw zone, click again to finish'), 'info');
  } else {
    checkbox.checked = false;
    $('zoneToggle').classList.remove('active');
    if (drawPoints.length >= 3) {
      finalizeZone();
    } else {
      drawPoints = [];
    }
    removeZoneCanvas();
  }
}

function deleteZone(index) {
  customZones.splice(index, 1);
  renderZoneList();
  sendZonesToServer();
  toast(t('区域已删除', 'Zone deleted'), 'info');
}

function clearAllZones() {
  customZones = [];
  drawPoints = [];
  removeZoneCanvas();
  renderZoneList();
  sendZonesToServer();
  toast(t('所有区域已清空', 'All zones cleared'), 'info');
}

function renderZoneList() {
  const list = $('zoneList');
  if (customZones.length === 0) {
    list.innerHTML = `<div style="font-size:11px; color:var(--text2); padding:8px;">${t('暂无自定义区域', 'No custom zones')}</div>`;
    return;
  }
  list.innerHTML = customZones.map((z, i) => `
    <div class="zone-item">
      <span class="zone-name">${z.name}</span>
      <button class="zone-delete" onclick="deleteZone(${i})">✕</button>
    </div>
  `).join('');
}

function sendZonesToServer() {
  if (!activeCamId) return;
  const body = {
    zones: customZones,
    lines: [],
    event_cooldown_seconds: parseFloat($('inCooldown').value) || 8,
    camera_id: activeCamId
  };
  fetch('/api/rules', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  }).catch(e => console.error('Failed to send zones:', e));
}

async function sendConfig() {
  const rules = {
    event_cooldown_seconds: parseFloat($('inCooldown').value) || 8,
    lines: [],
    zones: []
  };
  if (activeCamId && customZones.length > 0) {
    rules.camera_zones = { [activeCamId]: { zones: customZones, lines: [] } };
  } else if (customZones.length > 0) {
    rules.zones = customZones;
  }
  const body = {
    features: featureFlags,
    rules: rules,
    detector: {
      conf_threshold: parseFloat($('inConf').value) || 0.35
    }
  };
  try {
    if (wsConfig && wsConfig.readyState === WebSocket.OPEN) {
      wsConfig.send(JSON.stringify(body));
    } else {
      await fetch('/api/config', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
    }
  } catch(e) {}
}

function applyConfig() {
  sendConfig();
  toast(t('配置已应用', 'Config applied'));
}

function clearEvents() {
  $('evtList').innerHTML = '';
  $('evtCount').textContent = '0';
  $('vEvt').textContent = '0';
  const body = activeCamId ? JSON.stringify({ camera_id: activeCamId }) : '{}';
  fetch('/api/events/clear', { method: 'POST', headers: {'Content-Type': 'application/json'}, body });
  toast(t('日志已清空', 'Log cleared'), 'info');
}

function setConnStatus(status) {
  const dot = $('connDot');
  dot.className = 'conn-dot' + (status === 'off' ? ' off' : status === 'connecting' ? ' connecting' : '');
}

function connectWebSocket() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (wsVideo && wsVideo.readyState === WebSocket.OPEN) return;
  if (wsVideo) { wsVideo.onclose = null; wsVideo.close(); wsVideo = null; }

  setConnStatus('connecting');
  $('connText').textContent = t('连接中...', 'Connecting...');

  try {
    wsVideo = new WebSocket(wsVideoUrl);
    wsVideo.binaryType = 'arraybuffer';

    wsVideo.onopen = function() {
      reconnectAttempts = 0;
      streamMode = 'ws';
      setConnStatus('on');
      $('connText').textContent = 'WebSocket';
    };

    wsVideo.onmessage = function(event) {
      if (typeof event.data === 'string') {
        // JSON handshake or control message
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'handshake') {
            console.log('WS protocol v' + (msg.proto || 1));
          }
        } catch(e) {}
        return;
      }
      if (event.data instanceof ArrayBuffer && event.data.byteLength > 12) {
        const view = new DataView(event.data);
        // Binary protocol v2: [4B cam_id_len][cam_id][8B ts][frame_data]
        const camIdLen = view.getUint32(0);
        if (camIdLen > 0 && camIdLen < 256 && 4 + camIdLen + 8 < event.data.byteLength) {
          const camIdBytes = new Uint8Array(event.data.slice(4, 4 + camIdLen));
          const camId = new TextDecoder().decode(camIdBytes);
          // const ts = view.getFloat64(4 + camIdLen); // timestamp if needed
          const frameOffset = 4 + camIdLen + 8;
          if (camId && cameraStreams[camId]) {
            const img = cameraStreams[camId].imgEl;
            if (img) {
              const jpegBlob = new Blob([event.data.slice(frameOffset)], { type: 'image/jpeg' });
              const url = URL.createObjectURL(jpegBlob);
              const old = img.src;
              img.src = url;
              if (old && old.startsWith('blob:')) URL.revokeObjectURL(old);
            }
          }
        }
      }
    };

    wsVideo.onclose = function() {
      if (streamMode === 'ws') {
        streamMode = 'mjpeg';
        refreshAllStreams();
      }
      setConnStatus('off');
      $('connText').textContent = 'MJPEG';
      scheduleReconnect();
    };

    wsVideo.onerror = function() {
      if (wsVideo.readyState === WebSocket.CONNECTING) wsVideo.close();
    };
  } catch(e) {
    streamMode = 'mjpeg';
    refreshAllStreams();
    setConnStatus('off');
    scheduleReconnect();
  }

  try {
    if (wsConfig && wsConfig.readyState === WebSocket.OPEN) return;
    if (wsConfig) { wsConfig.onclose = null; wsConfig.close(); wsConfig = null; }
    wsConfig = new WebSocket(wsConfigUrl);
    wsConfig.onopen = function() {};
    wsConfig.onmessage = function(event) { try { JSON.parse(event.data); } catch(e) {} };
    wsConfig.onerror = function() {};
    wsConfig.onclose = function() {};
  } catch(e) {}
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  if (reconnectAttempts >= MAX_RECONNECT) {
    reconnectTimer = setTimeout(() => { reconnectAttempts = 0; reconnectTimer = null; connectWebSocket(); }, 120000);
    return;
  }
  const delay = Math.min(3000 * Math.pow(2, reconnectAttempts), 60000);
  reconnectAttempts++;
  reconnectTimer = setTimeout(() => { reconnectTimer = null; connectWebSocket(); }, delay);
}

function refreshAllStreams() {
  cameraList.forEach(cam => {
    const el = cameraStreams[cam.id]?.imgEl;
    if (el) el.src = `/api/cameras/${cam.id}/stream?t=${Date.now()}`;
  });
}

async function loadCameras() {
  try {
    const r = await fetch('/api/cameras');
    const newList = await r.json();
    const changed = JSON.stringify(newList) !== JSON.stringify(cameraList);
    if (changed) {
      const prevActive = activeCamId;
      cameraList = newList;
      if (cameraList.length > 0 && (!activeCamId || !cameraList.find(c => c.id === activeCamId))) {
        activeCamId = cameraList[0].id;
      }
      buildCameraGrid();
      buildCameraTabs();
      if (prevActive && prevActive !== activeCamId) {
        loadConfig();
        pollEvents();
        pollSnapshots();
      }
    }
  } catch(e) {
    console.error('loadCameras exception:', e);
  }
}

function cleanupBlobUrls() {
  for (const camId in cameraStreams) {
    const stream = cameraStreams[camId];
    if (stream && stream.imgEl) {
      const src = stream.imgEl.src;
      if (src && src.startsWith('blob:')) {
        URL.revokeObjectURL(src);
      }
    }
  }
}

function buildCameraGrid() {
  const grid = $('cameraGrid');
  const n = cameraList.length;
  $('camCount').textContent = `${n} ${t('个摄像头', 'cameras')}`;

  if (n === 0) {
    grid.className = 'camera-grid cols-1';
    grid.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:14px;">${t('暂无摄像头连接', 'No cameras connected')}</div>`;
    return;
  }

  const cols = n <= 1 ? 1 : n <= 2 ? 2 : n <= 4 ? 2 : 3;
  grid.className = `camera-grid cols-${cols}`;

  cleanupBlobUrls();

  grid.innerHTML = cameraList.map(cam => {
    const isActive = cam.id === activeCamId;
    return `<div class="camera-cell${isActive ? ' active' : ''}" id="cell-${cam.id}" onclick="selectCamera('${cam.id}')">
      <img id="img-${cam.id}" alt="${cam.name}" src="/api/cameras/${cam.id}/stream">
      <div class="cam-label">${cam.name}</div>
      <div class="cam-status" id="status-${cam.id}"></div>
    </div>`;
  }).join('');

  cameraStreams = {};
  cameraList.forEach(cam => {
    cameraStreams[cam.id] = { imgEl: $(`img-${cam.id}`) };
  });

  if (zoneDrawingMode) setupZoneCanvas();
}

function buildCameraTabs() {
  const tabs = $('cameraTabs');
  tabs.innerHTML = cameraList.map(cam => {
    const isActive = cam.id === activeCamId;
    return `<button class="camera-tab${isActive ? ' active' : ''}" onclick="selectCamera('${cam.id}')">${cam.name}</button>`;
  }).join('');
}

function selectCamera(camId) {
  if (activeCamId === camId) return;
  if (activeCamId) {
    cameraZones[activeCamId] = { zones: customZones.map(z => ({...z})), counter: zoneCounter };
  }
  activeCamId = camId;
  cameraList.forEach(cam => {
    const cell = document.getElementById(`cell-${cam.id}`);
    if (cell) cell.classList.toggle('active', cam.id === camId);
  });
  buildCameraTabs();
  const saved = cameraZones[camId];
  if (saved) {
    customZones = saved.zones;
    zoneCounter = saved.counter;
  } else {
    customZones = [];
    zoneCounter = 1;
  }
  _smoothedDet = 0;
  _smoothedTrk = 0;
  _smoothedEvt = 0;
  renderZoneList();
  loadConfig();
  pollEvents();
  pollSnapshots();
  if (zoneDrawingMode) {
    setupZoneCanvas();
  }
}

let _smoothedDet = 0, _smoothedTrk = 0, _smoothedEvt = 0;
const SMOOTH_FACTOR = 0.3;

function animateValue(el, current, target, suffix = '') {
  const diff = target - current;
  if (Math.abs(diff) < 0.5) {
    el.textContent = Math.round(target) + suffix;
    return target;
  }
  const next = current + diff * SMOOTH_FACTOR;
  el.textContent = Math.round(next) + suffix;
  return next;
}

async function pollStats() {
  try {
    let d = null;
    if (!activeCamId || !cameraList.length) {
      const r = await fetch('/api/stats');
      d = await r.json();
    } else {
      const r = await fetch(`/api/cameras/${activeCamId}/stats`);
      d = await r.json();
    }
    if (d && !d.error) {
      _smoothedDet = animateValue($('vDet'), _smoothedDet, d.detections ?? 0);
      _smoothedTrk = animateValue($('vTrk'), _smoothedTrk, d.tracks ?? 0);
      _smoothedEvt = animateValue($('vEvt'), _smoothedEvt, d.total_events ?? 0);
      $('vUp').textContent = fmtUp(d.uptime_seconds || 0);
      if (d.current_model && !switchingModel) {
        $('vModel').textContent = modelDisplayName(d.current_model);
        if (currentModelFile !== d.current_model) { currentModelFile = d.current_model; renderModelList(); }
      }
    }
    if (!wsVideo || wsVideo.readyState !== WebSocket.OPEN) {
      setConnStatus('on');
      $('connText').textContent = 'HTTP';
    }
  } catch(e) {
    if (!wsVideo || wsVideo.readyState !== WebSocket.OPEN) {
      setConnStatus('off');
      $('connText').textContent = t('离线', 'Offline');
    }
  }
}

async function pollEvents() {
  try {
    const dateInput = $('eventDate');
    const dateFilter = dateInput.value ? dateInput.value.replace(/-/g, '') : null;
    let url = '/api/events';
    const params = [];
    if (dateFilter) params.push(`date=${dateFilter}`);
    if (params.length) url += '?' + params.join('&');

    const r = await fetch(url);
    if (!r.ok) {
      console.error('pollEvents HTTP', r.status, r.statusText);
      return;
    }
    const text = await r.text();
    let evts;
    try { evts = JSON.parse(text); } catch(e) {
      console.error('pollEvents JSON parse error:', text.slice(0, 200));
      return;
    }
    if (!Array.isArray(evts)) {
      console.error('pollEvents expected array, got:', typeof evts);
      return;
    }
    const labels = EVENT_LABELS[currentLang] || EVENT_LABELS.zh;
    if (evts.length === 0) {
      $('evtList').innerHTML = `<div style="text-align:center;padding:16px;color:var(--text2);font-size:11px;">${t('暂无事件','No events')}</div>`;
      $('evtCount').textContent = '0';
    } else {
      $('evtList').innerHTML = evts.map(ev => {
        const etype = ev.event_type || 'unknown';
        const label = labels[etype] || etype;
        const loc = ev.zone_name || ev.line_name || '';
        const extra = ev.dwell_seconds ? `${ev.dwell_seconds}s` : '';
        const detail = [loc, extra].filter(Boolean).join(' · ');
        const tsFmt = formatEvtDisplay(ev.timestamp);
        const camTag = ev.camera_name ? `<span class="evt-cam">[${ev.camera_name}]</span> ` : '';
        return `<div class="evt">
          <div class="evt-tag tag-${etype}">${label}</div>
          <div class="evt-body">
            <div class="evt-main">${camTag}Track #${ev.track_id}${detail ? ' · ' + detail : ''}</div>
            <div class="evt-sub">${tsFmt.sub}</div>
          </div>
          <div class="evt-time">${tsFmt.short}</div>
        </div>`;
      }).join('');
      $('evtCount').textContent = evts.length;
    }
  } catch(e) {
    console.error('pollEvents exception:', e);
  }
}

async function pollSnapshots() {
  try {
    const dateInput = $('eventDate');
    const dateFilter = dateInput.value ? dateInput.value.replace(/-/g, '') : null;
    let url = '/api/events/images';
    const params = [];
    if (dateFilter) params.push(`date=${dateFilter}`);
    if (params.length) url += '?' + params.join('&');

    const r = await fetch(url);
    if (!r.ok) {
      console.error('pollSnapshots HTTP', r.status, r.statusText);
      return;
    }
    const text = await r.text();
    let imgs;
    try { imgs = JSON.parse(text); } catch(e) {
      console.error('pollSnapshots JSON parse error:', text.slice(0, 200));
      return;
    }
    if (!Array.isArray(imgs)) {
      console.error('pollSnapshots expected array, got:', typeof imgs);
      return;
    }
    const gallery = $('snapGallery');
    $('snapCount').textContent = imgs.length;
    if (imgs.length === 0) {
      gallery.innerHTML = `<div class="snap-empty">${t('暂无截图','No snapshots')}</div>`;
      return;
    }
    gallery.innerHTML = imgs.map(img =>
      `<img class="snap-thumb" src="${img.url}" loading="lazy" onclick="viewSnap('${img.url}')" title="${img.name}">`
    ).join('');
  } catch(e) {
    console.error('pollSnapshots exception:', e);
  }
}

function loadEventsByDate() { pollEvents(); pollSnapshots(); }
function resetEventDate() { $('eventDate').value = ''; pollEvents(); pollSnapshots(); }

function viewSnap(url) {
  const ov = document.createElement('div');
  ov.className = 'snap-overlay';
  ov.innerHTML = `<img src="${url}">`;
  ov.onclick = () => ov.remove();
  document.body.appendChild(ov);
}

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) {
      console.error('loadConfig HTTP', r.status, r.statusText);
      return;
    }
    const c = await r.json();
    const rules = c.rules || {};
    $('inCooldown').value = rules.event_cooldown_seconds || 8;

    const camZones = (rules.camera_zones && activeCamId) ? rules.camera_zones[activeCamId] : null;
    const effectiveZones = camZones ? camZones.zones : rules.zones;
    if (effectiveZones && effectiveZones.length > 0) {
      $('inDwell').value = effectiveZones[0].dwell_seconds || 10;
      customZones = effectiveZones.map(z => ({...z}));
      zoneCounter = customZones.length + 1;
      renderZoneList();
    } else if (!camZones) {
      customZones = [];
      zoneCounter = 1;
      renderZoneList();
    }

    if (c.detector?.conf_threshold) $('inConf').value = c.detector.conf_threshold;
    if (c.features) {
      for (const k in c.features) featureFlags[k] = c.features[k];
      detectActive = featureFlags.human_detect;
      buildFeatureGrid();
      updateDetectBtn();
    }
  } catch(e) {
    console.error('loadConfig exception:', e);
  }
}

async function probeCamera() {
  const ip = $('addCamIP').value.trim();
  if (!ip) { toast(t('请输入IP地址', 'Please enter IP address'), 'error'); return; }
  const statusEl = $('addCamStatus');
  statusEl.textContent = t('正在探测...', 'Probing...');
  statusEl.className = 'status-msg';
  try {
    const r = await fetch('/api/cameras/probe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        ip: ip,
        username: $('addCamUser').value || 'admin',
        password: $('addCamPass').value || '',
        rtsp_paths: [$('addCamPath').value || '/Streaming/Channels/101']
      })
    });
    const data = await r.json();
    if (data.reachable) {
      statusEl.textContent = t(`✓ 摄像头可达: ${data.source}`, `✓ Camera reachable: ${data.source}`);
      statusEl.className = 'status-msg ok';
    } else {
      statusEl.textContent = t('✗ 摄像头不可达', '✗ Camera not reachable');
      statusEl.className = 'status-msg err';
    }
  } catch(e) {
    statusEl.textContent = t('探测失败', 'Probe failed');
    statusEl.className = 'status-msg err';
  }
}

async function probeAndAddCamera() {
  const ip = $('addCamIP').value.trim();
  if (!ip) { toast(t('请输入IP地址', 'Please enter IP address'), 'error'); return; }
  const statusEl = $('addCamStatus');
  statusEl.textContent = t('正在探测并添加...', 'Probing and adding...');
  statusEl.className = 'status-msg';
  try {
    const r = await fetch('/api/cameras/add', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        ip: ip,
        name: $('addCamName').value || `camera-${ip}`,
        username: $('addCamUser').value || 'admin',
        password: $('addCamPass').value || '',
        rtsp_path: $('addCamPath').value || '/Streaming/Channels/101',
        use_gstreamer: true
      })
    });
    const data = await r.json();
    if (data.status === 'ok') {
      statusEl.textContent = t(`✓ 摄像头已添加: ${data.camera.id}`, `✓ Camera added: ${data.camera.id}`);
      statusEl.className = 'status-msg ok';
      toast(t('摄像头添加成功', 'Camera added successfully'));
      $('addCamIP').value = '';
      $('addCamName').value = '';
      setTimeout(() => loadCameras(), 1000);
    } else {
      statusEl.textContent = t(`✗ ${data.error || '添加失败'}`, `✗ ${data.error || 'Add failed'}`);
      statusEl.className = 'status-msg err';
    }
  } catch(e) {
    statusEl.textContent = t('添加失败', 'Add failed');
    statusEl.className = 'status-msg err';
  }
}

switchLang(currentLang);
buildFeatureGrid();
updateDetectBtn();
setInterval(updateClock, 1000);
updateClock();

(async function init() {
  await loadConfig();
  await loadCameras();
  loadModels();
  connectWebSocket();
  pollStats();
  pollEvents();
  pollSnapshots();
  setInterval(pollStats, 1000);
  setInterval(pollEvents, 3000);
  setInterval(pollSnapshots, 5000);
  setInterval(loadModels, 60000);
  setInterval(loadCameras, 5000);
})();
</script>
</body>
